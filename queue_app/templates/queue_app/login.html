<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Fixio</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800&family=Epilogue:wght@700;800&display=swap');

        :root {
            --bg-color: #F6F0E5; 
            --card-bg-white: #FFFFFF;
            --accent-purple: #C499F3; 
            --accent-orange: #F4A261; 
            --accent-blue: #A2B2EE;
            --accent-green: #A3D9B1;
            --accent-pink: #FFB3DE;
            --text-color: #121614; 
            
            --neo-border: 3.5px solid var(--text-color);
            --neo-shadow: 7px 7px 0px var(--text-color);
            --neo-shadow-sm: 4px 4px 0px var(--text-color);
            
            --font-brodish: 'Epilogue', sans-serif;
            --font-body: 'Lexend', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, #7CD5EE 0%, #7CD5EE 40%, #F5AB99 40%, #F5AB99 75%, #F4A261 75%, #F4A261 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg-white);
            border: var(--neo-border);
            box-shadow: 12px 12px 0px var(--text-color);
            padding: 50px 40px;
            position: relative;
        }

        .login-logo {
            font-family: var(--font-brodish);
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -1px;
        }

        .login-logo span {
            background: var(--accent-green);
            padding: 4px 10px;
            border: 2.5px solid var(--text-color);
            font-size: 1.1rem;
        }

        .login-subtitle {
            text-align: center;
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-family: var(--font-brodish);
            font-weight: 700;
            font-size: 1rem;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 700;
            border: var(--neo-border);
            background-color: #fff;
            box-sizing: border-box;
            transition: all 0.1s ease;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            transform: translate(-2px, -2px);
            box-shadow: var(--neo-shadow-sm);
        }

        .btn-login {
            font-family: var(--font-brodish);
            font-weight: 800;
            background-color: var(--text-color);
            color: #fff;
            border: var(--neo-border);
            padding: 14px 24px;
            cursor: pointer;
            box-shadow: var(--neo-shadow-sm);
            transition: transform 0.1s, box-shadow 0.1s;
            text-decoration: none;
            display: block;
            text-align: center;
            font-size: 1.1rem;
            width: 100%;
            box-sizing: border-box;
            margin-top: 30px;
        }

        .btn-login:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--text-color);
        }

        .btn-login:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--text-color);
        }

        .error-message {
            background: #FF6B6B;
            color: #fff;
            border: 2.5px solid var(--text-color);
            padding: 12px 18px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 20px;
            box-shadow: var(--neo-shadow-sm);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-family: var(--font-brodish);
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-color);
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.15s;
        }

        .back-link:hover {
            opacity: 1;
        }

        /* Decorative accent bar */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--accent-green) 0%, var(--accent-green) 33%, var(--accent-orange) 33%, var(--accent-orange) 66%, var(--accent-purple) 66%, var(--accent-purple) 100%);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span>&lt;/&gt;</span> Fixio
            </div>
            <div class="login-subtitle">Admin Panel Login</div>

            {% if error_message %}
            <div class="error-message">
                ⚠ {{ error_message }}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Masukkan username admin" autofocus>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Masukkan password">
                </div>
                
                <button type="submit" class="btn-login">MASUK KE DASHBOARD →</button>
            </form>

            <a href="{% url 'daftar_antrian' %}" class="back-link">← Kembali ke Halaman Antrian</a>
        </div>
    </div>

</body>
</html>
