{% extends 'queue_app/base.html' %}

{% block title %}Pengaturan Antrian — Fixio{% endblock %}

{% block content %}
<h2 class="section-title">Edit Data Antrian</h2>

<div class="layout-grid" style="grid-template-columns: 1fr; max-width: 800px;">
    
    <div class="neo-box" style="background-color: var(--accent-orange);">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: var(--neo-border); padding-bottom: 10px; margin-bottom: 20px;">
            <h3 style="font-family: var(--font-brodish); font-size: 1.5rem; margin: 0;">Formulir Perbaikan</h3>
            <a href="javascript:history.back()" style="font-family: var(--font-body); font-weight: 700; color: var(--text-color); text-decoration: none; border: 2px solid var(--text-color); padding: 4px 10px; background: #fff;">Batal</a>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nama Pelanggan</label>
                <input type="text" name="nama" value="{{ antrian.nama_pelanggan }}" required>
            </div>
            
            <div class="form-group">
                <label>Tipe / Model HP</label>
                <input type="text" name="tipe" value="{{ antrian.tipe_hp }}" required>
            </div>
            
            <div class="form-group">
                <label>Detail Kerusakan</label>
                <textarea name="keluhan" rows="5" required>{{ antrian.keluhan }}</textarea>
            </div>
            
            <button type="submit" style="background-color: var(--text-color); color: #fff; width: 100%;">SIMPAN PERUBAHAN ↵</button>
        </form>
    </div>

</div>
{% endblock %}
